name: Build and Release

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
      - 'feature/**'
      - 'fix/**'
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check for non-ASCII characters
        run: |
          echo "Checking for non-ASCII characters in source files..."
          NON_ASCII=$(find . -type f \( -name "*.py" -o -name "*.toml" -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.sh" \) \
            ! -path "./.git/*" \
            -exec grep -Pl '[^\x00-\x7F]' {} \; 2>/dev/null || true)

          if [ -n "$NON_ASCII" ]; then
            echo "ERROR: Non-ASCII characters found in the following files:"
            echo "$NON_ASCII"
            echo ""
            echo "Details:"
            for file in $NON_ASCII; do
              echo "=== $file ==="
              grep -Pn '[^\x00-\x7F]' "$file" || true
            done
            exit 1
          fi

          echo "All source files contain only ASCII characters."

  build-amd64:
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set image name (lowercase)
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}-builder-amd64" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache,mode=max
          load: true

      - name: Build agent binary (amd64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e TARGET_ARCH=amd64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest \
            bash /workspace/py2exe.sh

      - name: Fix permissions and create tarball (amd64)
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          cp -r selinux/ dist/linux/fivenines-agent-linux-amd64/selinux/
          cd dist/linux
          tar -czvf fivenines-agent-linux-amd64.tar.gz fivenines-agent-linux-amd64/
          mv fivenines-agent-linux-amd64.tar.gz ../

      - name: Upload artifact (amd64)
        uses: actions/upload-artifact@v5
        with:
          name: fivenines-agent-linux-amd64
          path: dist/fivenines-agent-linux-amd64.tar.gz
          retention-days: 7

  build-arm64:
    needs: [lint]
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner - much faster than QEMU
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set image name (lowercase)
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}-builder-arm64" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.arm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache,mode=max
          load: true

      - name: Build agent binary (arm64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e TARGET_ARCH=arm64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest \
            bash /workspace/py2exe.sh

      - name: Fix permissions and create tarball (arm64)
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          cp -r selinux/ dist/linux/fivenines-agent-linux-arm64/selinux/
          cd dist/linux
          tar -czvf fivenines-agent-linux-arm64.tar.gz fivenines-agent-linux-arm64/
          mv fivenines-agent-linux-arm64.tar.gz ../

      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v5
        with:
          name: fivenines-agent-linux-arm64
          path: dist/fivenines-agent-linux-arm64.tar.gz
          retention-days: 7

  build-alpine-amd64:
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set image name (lowercase)
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}-builder-alpine-amd64" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image (alpine-amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.alpine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache,mode=max
          load: true

      - name: Build agent binary (alpine-amd64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e TARGET_ARCH=amd64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest \
            sh /workspace/py2exe_alpine.sh

      - name: Fix permissions and create tarball (alpine-amd64)
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          cp -r selinux/ dist/linux/fivenines-agent-alpine-amd64/selinux/
          cd dist/linux
          tar -czvf fivenines-agent-alpine-amd64.tar.gz fivenines-agent-alpine-amd64/
          mv fivenines-agent-alpine-amd64.tar.gz ../

      - name: Upload artifact (alpine-amd64)
        uses: actions/upload-artifact@v5
        with:
          name: fivenines-agent-alpine-amd64
          path: dist/fivenines-agent-alpine-amd64.tar.gz
          retention-days: 7

  build-alpine-arm64:
    needs: [lint]
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set image name (lowercase)
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}-builder-alpine-arm64" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image (alpine-arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.alpine-arm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache,mode=max
          load: true

      - name: Build agent binary (alpine-arm64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e TARGET_ARCH=arm64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest \
            sh /workspace/py2exe_alpine.sh

      - name: Fix permissions and create tarball (alpine-arm64)
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          cp -r selinux/ dist/linux/fivenines-agent-alpine-arm64/selinux/
          cd dist/linux
          tar -czvf fivenines-agent-alpine-arm64.tar.gz fivenines-agent-alpine-arm64/
          mv fivenines-agent-alpine-arm64.tar.gz ../

      - name: Upload artifact (alpine-arm64)
        uses: actions/upload-artifact@v5
        with:
          name: fivenines-agent-alpine-arm64
          path: dist/fivenines-agent-alpine-arm64.tar.gz
          retention-days: 7

  build-synology-amd64:
    needs: [build-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build agent binary (synology-amd64)
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ github.repository }}-builder-amd64" | tr '[:upper:]' '[:lower:]')
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e TARGET_ARCH=amd64 \
            -e SYNOLOGY=1 \
            ${IMAGE}:latest \
            bash /workspace/py2exe.sh

      - name: Fix permissions and build SPK (synology-amd64)
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          bash synology/build_spk.sh "$VERSION" x86_64

      - name: Upload artifact (synology-amd64)
        uses: actions/upload-artifact@v5
        with:
          name: fivenines-agent-synology-amd64
          path: dist/synology/fivenines-agent-*-x86_64.spk
          retention-days: 7

  build-synology-arm64:
    needs: [build-arm64]
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build agent binary (synology-arm64)
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ github.repository }}-builder-arm64" | tr '[:upper:]' '[:lower:]')
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e TARGET_ARCH=arm64 \
            -e SYNOLOGY=1 \
            ${IMAGE}:latest \
            bash /workspace/py2exe.sh

      - name: Fix permissions and build SPK (synology-arm64)
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          bash synology/build_spk.sh "$VERSION" aarch64

      - name: Upload artifact (synology-arm64)
        uses: actions/upload-artifact@v5
        with:
          name: fivenines-agent-synology-arm64
          path: dist/synology/fivenines-agent-*-aarch64.spk
          retention-days: 7

  # Verify install scripts are valid shell
  shellcheck-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on install scripts
        run: |
          shellcheck -s sh -e SC2034 \
            fivenines_setup.sh \
            fivenines_update.sh \
            fivenines_uninstall.sh \
            fivenines_setup_user.sh \
            fivenines_update_user.sh \
            fivenines_uninstall_user.sh \
            fivenines_common.sh \
            ci/test-distro.sh \
            ci/test-selinux-vm.sh

      - name: Verify shared functions are in sync
        run: sh ci/build-scripts.sh --check || echo "Warning - shared functions out of sync (non-blocking)"

  # Distro regression testing
  test-distro-matrix:
    needs: [build-amd64, build-arm64, build-alpine-amd64, build-alpine-arm64]
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux-amd64 (glibc) distros
          - distro: centos:7
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          - distro: rockylinux:8
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          - distro: ubuntu:20.04
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          - distro: ubuntu:22.04
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          - distro: debian:11
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          - distro: debian:12
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          - distro: rockylinux:9
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          # TODO: Remove allow_failure when rockylinux:10 image is GA and tests pass
          - distro: rockylinux:10
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
            allow_failure: "1"
          - distro: fedora:latest
            binary: linux-amd64
            runner: ubuntu-latest
            skip_ldd: "0"
          # linux-arm64 (glibc) distros
          - distro: ubuntu:22.04
            binary: linux-arm64
            runner: ubuntu-24.04-arm
            skip_ldd: "0"
          - distro: debian:12
            binary: linux-arm64
            runner: ubuntu-24.04-arm
            skip_ldd: "0"
          - distro: rockylinux:9
            binary: linux-arm64
            runner: ubuntu-24.04-arm
            skip_ldd: "0"
          # alpine-amd64 (musl) distros
          # Note: Alpine 3.18 removed - binary requires musl pwritev2 (Alpine 3.19+)
          - distro: alpine:3.21
            binary: alpine-amd64
            runner: ubuntu-latest
            skip_ldd: "1"
          # alpine-arm64 (musl) distros
          - distro: alpine:3.21
            binary: alpine-arm64
            runner: ubuntu-24.04-arm
            skip_ldd: "1"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: fivenines-agent-${{ matrix.binary }}
          path: artifacts

      - name: Extract artifact
        run: |
          mkdir -p agent
          tar -xzf artifacts/fivenines-agent-${{ matrix.binary }}.tar.gz -C agent/

      - name: Report binary size
        run: |
          BINARY_PATH="agent/fivenines-agent-${{ matrix.binary }}/fivenines-agent-${{ matrix.binary }}"
          SIZE_BYTES=$(stat -c '%s' "$BINARY_PATH" 2>/dev/null || stat -f '%z' "$BINARY_PATH")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "### Binary Size: fivenines-agent-${{ matrix.binary }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| fivenines-agent-${{ matrix.binary }} | ${SIZE_MB} MB (${SIZE_BYTES} bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Run distro tests
        id: distro-test
        continue-on-error: ${{ matrix.allow_failure == '1' }}
        run: |
          mkdir -p ${{ github.workspace }}/test-output
          docker run --rm \
            -v ${{ github.workspace }}/agent:/agent:ro \
            -v ${{ github.workspace }}:/scripts:ro \
            -v ${{ github.workspace }}/test-output:/test-output \
            -e BINARY_VARIANT="${{ matrix.binary }}" \
            -e AGENT_DIR="/agent" \
            -e SCRIPTS_DIR="/scripts" \
            -e SKIP_LDD="${{ matrix.skip_ldd }}" \
            -e FIVENINES_TEST_MODE=1 \
            -e TEST_OUTPUT_DIR="/test-output" \
            ${{ matrix.distro }} \
            sh /scripts/ci/test-distro.sh

      - name: Append test results to step summary
        if: always()
        run: |
          if [ -f ${{ github.workspace }}/test-output/test-results.md ]; then
            cat ${{ github.workspace }}/test-output/test-results.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test logs on failure
        if: steps.distro-test.outcome == 'failure'
        uses: actions/upload-artifact@v5
        with:
          name: test-logs-${{ matrix.binary }}-${{ strategy.job-index }}
          path: ${{ github.workspace }}/test-output/
          retention-days: 7

  # SELinux integration test (RockyLinux 9 VM with SELinux Enforcing)
  test-selinux-vm:
    needs: [build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: fivenines-agent-linux-amd64
          path: artifacts

      - name: Install QEMU and cloud-init tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils genisoimage netcat-openbsd

      - name: Enable KVM access
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM device found"
            ls -la /dev/kvm
            # GitHub Actions runner may not be in the kvm group
            sudo chmod 666 /dev/kvm
            echo "KVM permissions set"
          else
            echo "WARNING: /dev/kvm not available, test will be slow (no KVM acceleration)"
          fi

      - name: Download RockyLinux 9 cloud image
        run: |
          wget -q "https://dl.rockylinux.org/pub/rocky/9/images/x86_64/Rocky-9-GenericCloud-Base.latest.x86_64.qcow2" \
            -O /tmp/rocky9.qcow2
          echo "Image size: $(du -h /tmp/rocky9.qcow2 | cut -f1)"

      - name: Run SELinux VM test
        run: |
          bash ci/test-selinux-vm.sh
        env:
          AGENT_TARBALL: artifacts/fivenines-agent-linux-amd64.tar.gz
          SCRIPTS_DIR: ${{ github.workspace }}
          ROCKY_IMAGE: /tmp/rocky9.qcow2
          VM_TIMEOUT: 600

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: selinux-vm-test-logs
          path: /tmp/vm-console.log
          retention-days: 7

  # Pre-release for feature and release branches
  pre-release:
    needs: [build-amd64, build-arm64, build-alpine-amd64, build-alpine-arm64, build-synology-amd64, build-synology-arm64, test-distro-matrix, test-selinux-vm]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.ref, 'refs/tags/') &&
       (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/feature/')))
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: fivenines-agent-*
          merge-multiple: false

      - name: Generate release tag name
        id: release_info
        run: |
          # Extract branch name and sanitize it (replace / with -)
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')

          # Get short commit hash
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)

          # Create tag name: branch-name-commithash
          TAG_NAME="${SANITIZED_BRANCH}-${SHORT_SHA}"

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

          echo "Generated tag name: $TAG_NAME"

      - name: Prepare release assets
        id: pre_release_assets
        run: |
          mkdir -p release
          mv artifacts/fivenines-agent-linux-amd64/fivenines-agent-linux-amd64.tar.gz release/
          mv artifacts/fivenines-agent-linux-arm64/fivenines-agent-linux-arm64.tar.gz release/
          mv artifacts/fivenines-agent-alpine-amd64/fivenines-agent-alpine-amd64.tar.gz release/
          mv artifacts/fivenines-agent-alpine-arm64/fivenines-agent-alpine-arm64.tar.gz release/
          mv artifacts/fivenines-agent-synology-amd64/*.spk release/
          mv artifacts/fivenines-agent-synology-arm64/*.spk release/
          ls -la release/

          # Resolve SPK filenames for download URLs
          SPK_X86=$(basename release/*-x86_64.spk)
          SPK_ARM=$(basename release/*-aarch64.spk)
          echo "SPK_X86=$SPK_X86" >> $GITHUB_OUTPUT
          echo "SPK_ARM=$SPK_ARM" >> $GITHUB_OUTPUT

      - name: Delete existing pre-release with same tag (if exists)
        run: |
          gh release delete "${{ steps.release_info.outputs.TAG_NAME }}" --yes || true
          git push origin --delete "refs/tags/${{ steps.release_info.outputs.TAG_NAME }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.TAG_NAME }}
          name: "Test Build: ${{ steps.release_info.outputs.BRANCH_NAME }} (${{ steps.release_info.outputs.SHORT_SHA }})"
          draft: false
          prerelease: true
          body: |
            ## Test Build

            **Branch:** `${{ steps.release_info.outputs.BRANCH_NAME }}`
            **Commit:** `${{ github.sha }}`

            This is an automated pre-release build for testing purposes.

            ### Quick Install (replace existing agent)
            ```bash
            # System install (root) - glibc
            FIVENINES_AGENT_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-linux-amd64.tar.gz" bash fivenines_update.sh

            # System install (root) - Alpine/musl
            FIVENINES_AGENT_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-alpine-amd64.tar.gz" bash fivenines_update.sh

            # User install
            FIVENINES_AGENT_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-linux-amd64.tar.gz" bash fivenines_update_user.sh
            ```

            ### Download URLs
            ```
            # AMD64 (glibc)
            https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-linux-amd64.tar.gz

            # ARM64 (glibc)
            https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-linux-arm64.tar.gz

            # AMD64 (Alpine/musl)
            https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-alpine-amd64.tar.gz

            # ARM64 (Alpine/musl)
            https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/fivenines-agent-alpine-arm64.tar.gz

            # Synology DSM 7 (x86_64 NAS)
            https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/${{ steps.pre_release_assets.outputs.SPK_X86 }}

            # Synology DSM 7 (aarch64 NAS)
            https://github.com/${{ github.repository }}/releases/download/${{ steps.release_info.outputs.TAG_NAME }}/${{ steps.pre_release_assets.outputs.SPK_ARM }}
            ```
          files: |
            release/fivenines-agent-linux-amd64.tar.gz
            release/fivenines-agent-linux-arm64.tar.gz
            release/fivenines-agent-alpine-amd64.tar.gz
            release/fivenines-agent-alpine-arm64.tar.gz
            release/*.spk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Production release for version tags
  release:
    needs: [build-amd64, build-arm64, build-alpine-amd64, build-alpine-arm64, build-synology-amd64, build-synology-arm64, test-distro-matrix, test-selinux-vm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: fivenines-agent-*
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          mv artifacts/fivenines-agent-linux-amd64/fivenines-agent-linux-amd64.tar.gz release/
          mv artifacts/fivenines-agent-linux-arm64/fivenines-agent-linux-arm64.tar.gz release/
          mv artifacts/fivenines-agent-alpine-amd64/fivenines-agent-alpine-amd64.tar.gz release/
          mv artifacts/fivenines-agent-alpine-arm64/fivenines-agent-alpine-arm64.tar.gz release/
          mv artifacts/fivenines-agent-synology-amd64/*.spk release/
          mv artifacts/fivenines-agent-synology-arm64/*.spk release/
          ls -la release/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/fivenines-agent-linux-amd64.tar.gz
            release/fivenines-agent-linux-arm64.tar.gz
            release/fivenines-agent-alpine-amd64.tar.gz
            release/fivenines-agent-alpine-arm64.tar.gz
            release/*.spk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Sync releases to Cloudflare R2 for IPv6 support
  sync-to-r2:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: fivenines-agent-*
          merge-multiple: false

      - name: Prepare files for R2
        run: |
          mkdir -p r2-upload/latest

          # Copy release binaries (glibc)
          cp artifacts/fivenines-agent-linux-amd64/fivenines-agent-linux-amd64.tar.gz r2-upload/latest/
          cp artifacts/fivenines-agent-linux-arm64/fivenines-agent-linux-arm64.tar.gz r2-upload/latest/

          # Copy release binaries (Alpine/musl)
          cp artifacts/fivenines-agent-alpine-amd64/fivenines-agent-alpine-amd64.tar.gz r2-upload/latest/
          cp artifacts/fivenines-agent-alpine-arm64/fivenines-agent-alpine-arm64.tar.gz r2-upload/latest/

          # Copy Synology SPK packages
          cp artifacts/fivenines-agent-synology-amd64/*.spk r2-upload/latest/
          cp artifacts/fivenines-agent-synology-arm64/*.spk r2-upload/latest/

          # Copy static files (service, OpenRC, and boot script)
          cp fivenines-agent.service r2-upload/latest/
          cp fivenines-agent.openrc r2-upload/latest/
          cp fivenines_script.sh r2-upload/latest/

          # Copy install/update/uninstall scripts
          cp fivenines_setup.sh r2-upload/latest/
          cp fivenines_setup_user.sh r2-upload/latest/
          cp fivenines_update.sh r2-upload/latest/
          cp fivenines_update_user.sh r2-upload/latest/
          cp fivenines_uninstall.sh r2-upload/latest/
          cp fivenines_uninstall_user.sh r2-upload/latest/

          ls -la r2-upload/latest/

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Sync to R2
        run: |
          # Upload to /latest/ (always the most recent release)
          rclone sync r2-upload/latest/ r2:${{ secrets.R2_BUCKET_NAME }}/latest/ --s3-no-check-bucket --verbose --header-upload "Cache-Control: no-cache, must-revalidate"

          # Also upload to versioned path for reference
          VERSION="${GITHUB_REF#refs/tags/}"
          rclone sync r2-upload/latest/ r2:${{ secrets.R2_BUCKET_NAME }}/${VERSION}/ --s3-no-check-bucket --verbose --header-upload "Cache-Control: max-age=31536000, immutable"

          echo "Files synced to R2:"
          echo "  - https://releases.fivenines.io/latest/fivenines-agent-linux-amd64.tar.gz"
          echo "  - https://releases.fivenines.io/latest/fivenines-agent-linux-arm64.tar.gz"
          echo "  - https://releases.fivenines.io/latest/fivenines-agent-alpine-amd64.tar.gz"
          echo "  - https://releases.fivenines.io/latest/fivenines-agent-alpine-arm64.tar.gz"
          for spk in r2-upload/latest/*.spk; do echo "  - https://releases.fivenines.io/latest/$(basename $spk)"; done
          echo "  - https://releases.fivenines.io/latest/fivenines-agent.service"
          echo "  - https://releases.fivenines.io/latest/fivenines-agent.openrc"
          echo "  - https://releases.fivenines.io/latest/fivenines_script.sh"
