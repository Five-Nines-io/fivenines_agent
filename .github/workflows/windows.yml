name: Windows Build

# Windows CI for the agent: tests, frozen-binary build, MSI build, and the
# end-to-end install smoke (D14 + D20 - CI is the quality gate for the
# single combined release).
#
# Coverage handling per D3: the per-OS pytest run uses --cov but NOT
# --cov-fail-under (Windows alone cannot reach 100% because Linux-only
# branches are unreachable here, and vice versa on the Linux CI in
# build-release.yml). The combined-coverage gate that merges both OS runs
# is a follow-up; tracked in TODOS.md. For now, the per-OS coverage XML is
# uploaded as an artifact so it can be aggregated externally.

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
      - 'feature/**'
      - 'fix/**'
      - 'spuyet/windows-server-support'
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '2.2.1'
  WIX_VERSION: '4.0.4'
  # WinSW v2 (.NET Framework 4 - in-box on Server 2019/2022/2025 + Win 10/11)
  WINSW_VERSION: '2.12.0'
  WINSW_URL: 'https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW.NET4.exe'
  # TODO: pin and verify the SHA256 on the first green run, then enforce here.
  WINSW_SHA256: 'TBD-PIN-ON-FIRST-GREEN'

jobs:
  test-windows:
    name: Tests (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        shell: pwsh
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install dependencies (windows group, virtualization excluded)
        shell: pwsh
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --without virtualization --with windows --with test

      - name: Run tests with coverage (no fail-under per D3)
        shell: pwsh
        run: |
          poetry run pytest tests/ `
            --cov=fivenines_agent `
            --cov-report=xml:coverage-windows.xml `
            --cov-report=term-missing

      - name: Upload Windows coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-windows
          path: coverage-windows.xml
          retention-days: 7

  build-windows-binary:
    name: Build frozen agent (PyInstaller)
    needs: test-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        shell: pwsh
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Run Windows PyInstaller build
        shell: pwsh
        env:
          TARGET_ARCH: amd64
        run: .\py2exe_windows.ps1

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: fivenines-agent-windows-amd64
          path: dist/windows/fivenines-agent-windows-amd64/
          retention-days: 7

  build-msi:
    name: Build MSI installer
    needs: build-windows-binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: fivenines-agent-windows-amd64
          path: dist/windows/fivenines-agent-windows-amd64/

      - name: Download WinSW
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/windows" | Out-Null
          $dst = "dist/windows/WinSW.NET4.exe"
          Invoke-WebRequest -Uri "${{ env.WINSW_URL }}" -OutFile $dst
          $hash = (Get-FileHash $dst -Algorithm SHA256).Hash
          Write-Host "Downloaded WinSW v${{ env.WINSW_VERSION }} - SHA256: $hash"
          # TODO: when WINSW_SHA256 is no longer TBD, enforce: exit 1 on mismatch.
          if ("${{ env.WINSW_SHA256 }}" -ne "TBD-PIN-ON-FIRST-GREEN" -and $hash -ne "${{ env.WINSW_SHA256 }}") {
            Write-Error "WinSW SHA256 mismatch: expected ${{ env.WINSW_SHA256 }}, got $hash"
            exit 1
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version "${{ env.WIX_VERSION }}"
          wix extension add --global "WixToolset.Util.wixext/${{ env.WIX_VERSION }}"

      - name: Build MSI
        shell: pwsh
        working-directory: windows/installer
        run: |
          wix build .\Product.wxs `
            -ext WixToolset.Util.wixext `
            -d "AgentBinarySource=..\..\dist\windows\fivenines-agent-windows-amd64\fivenines-agent-windows-amd64.exe" `
            -d "WinSwSource=..\..\dist\windows\WinSW.NET4.exe" `
            -d "WinSwConfigSource=..\winsw\fivenines-agent.xml" `
            -arch x64 `
            -o fivenines-agent.msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: fivenines-agent-msi
          path: windows/installer/fivenines-agent.msi
          retention-days: 30

  smoke-msi:
    name: E2E smoke (install -> service -> report -> uninstall)
    needs: build-msi
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: fivenines-agent-msi
          path: .

      - name: Pre-create service account (D12 low-priv + Performance Monitor Users)
        shell: pwsh
        run: |
          # Generate a 24-character random password. Using New-LocalUser
          # rather than `net user` so the legacy "longer than 14 characters"
          # interactive prompt doesn't block on a non-tty CI runner.
          $passwd = -join ((33..126) | Get-Random -Count 24 | ForEach-Object { [char]$_ })
          # Mask the generated password from any subsequent log lines.
          Write-Host "::add-mask::$passwd"
          $securePwd = ConvertTo-SecureString $passwd -AsPlainText -Force

          New-LocalUser -Name "fivenines-agent" `
              -Password $securePwd `
              -PasswordNeverExpires `
              -UserMayNotChangePassword `
              -AccountNeverExpires `
              -Description "Fivenines agent service account (CI smoke)" `
              -ErrorAction Stop

          Add-LocalGroupMember `
              -Group "Performance Monitor Users" `
              -Member "fivenines-agent" `
              -ErrorAction Stop

          # Add to BUILTIN\Users so the account inherits the default Read &
          # Execute ACE on %ProgramFiles%. Without this membership the service
          # process can't load its own python311.dll out of the install dir
          # (LoadLibrary returns "The specified module could not be found",
          # surfaced by PyInstaller as PYI-8860). New-LocalUser does NOT add
          # to Users implicitly; legacy `net user /add` did, which masked
          # this requirement on older runners.
          Add-LocalGroupMember `
              -Group "Users" `
              -Member "fivenines-agent" `
              -ErrorAction Stop

          $sid = (New-Object System.Security.Principal.NTAccount("fivenines-agent")).Translate([System.Security.Principal.SecurityIdentifier]).Value
          Write-Host "Service account SID: $sid"

          # Grant SeServiceLogonRight ("Log on as a service") via secedit. SCM
          # refuses to start any service under an account that lacks this
          # privilege - that's what produced "Cannot start service" with a
          # generic error and no Event Log entry. MSI ServiceInstall used to
          # grant this implicitly; on Windows Server 2025 it does not.
          $tmpCfg = Join-Path $env:TEMP "secpolicy.cfg"
          $tmpDb  = Join-Path $env:TEMP "secpolicy.sdb"
          secedit /export /cfg $tmpCfg /areas USER_RIGHTS /quiet | Out-Null
          $content = Get-Content $tmpCfg
          $found = $false
          for ($i = 0; $i -lt $content.Length; $i++) {
              if ($content[$i] -match '^SeServiceLogonRight\s*=') {
                  if ($content[$i] -notmatch [regex]::Escape("*$sid")) {
                      $content[$i] = $content[$i].TrimEnd() + ",*$sid"
                  }
                  $found = $true
                  break
              }
          }
          if (-not $found) {
              $appended = @()
              foreach ($line in $content) {
                  $appended += $line
                  if ($line -match '^\[Privilege Rights\]') {
                      $appended += "SeServiceLogonRight = *$sid"
                  }
              }
              $content = $appended
          }
          $content | Set-Content -Encoding ascii $tmpCfg
          secedit /configure /db $tmpDb /cfg $tmpCfg /areas USER_RIGHTS /quiet | Out-Null
          Remove-Item $tmpCfg, $tmpDb -ErrorAction SilentlyContinue
          Write-Host "Granted SeServiceLogonRight to fivenines-agent"

          # Use the COMPUTERNAME\Username form rather than .\Username so WiX's
          # Wix4ExecSecureObjects custom action (which processes util:PermissionEx
          # entries via the Win32 LookupAccountName API) can resolve the SID.
          # The .\ prefix is rejected by LookupAccountName on this runner image.
          "SERVICEACCOUNT=$env:COMPUTERNAME\fivenines-agent" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "SERVICEACCOUNTPASSWORD=$passwd"                   | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Install MSI silently
        shell: pwsh
        timeout-minutes: 5
        run: |
          $token = "ci-smoke-token-" + (Get-Random)
          $msiArgs = "/i fivenines-agent.msi TOKEN=$token SERVICEACCOUNT=$env:SERVICEACCOUNT SERVICEACCOUNTPASSWORD=$env:SERVICEACCOUNTPASSWORD /qn /l*v install.log"
          $p = Start-Process msiexec -ArgumentList $msiArgs -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            Write-Host "msiexec exit code: $($p.ExitCode)"
            Get-Content install.log -Tail 200
            exit 1
          }

      - name: Verify service is registered and running
        shell: pwsh
        run: |
          $svc = Get-Service -Name "fivenines-agent" -ErrorAction Stop
          Write-Host "Service status: $($svc.Status)"
          if ($svc.Status -ne "Running") {
            try {
              Start-Service -Name "fivenines-agent" -ErrorAction Stop
            } catch {
              Write-Host "Start-Service threw: $_"
            }
            Start-Sleep -Seconds 5
            $svc = Get-Service -Name "fivenines-agent"
            Write-Host "Service status after start attempt: $($svc.Status)"
          }
          if ($svc.Status -ne "Running") {
            Write-Host "=== Recent System events ==="
            Get-WinEvent -LogName System -MaxEvents 15 -ErrorAction SilentlyContinue |
              Where-Object { $_.ProviderName -match "Service Control Manager|fivenines" } |
              Format-List TimeCreated, ProviderName, LevelDisplayName, Message
            Write-Host "=== Recent Application events ==="
            Get-WinEvent -LogName Application -MaxEvents 30 -ErrorAction SilentlyContinue |
              Format-List TimeCreated, ProviderName, LevelDisplayName, Message
            $logDir = Join-Path $env:ProgramData "fivenines_agent\logs"
            if (Test-Path $logDir) {
              Write-Host "=== WinSW log directory ==="
              Get-ChildItem $logDir | Format-Table
              Get-ChildItem $logDir | ForEach-Object {
                Write-Host "--- $($_.Name) ---"
                Get-Content $_.FullName -Tail 50
              }
            }
            Write-Error "Service did not reach Running state"
            exit 1
          }

      - name: Verify TOKEN file ACL is restrictive (F1)
        shell: pwsh
        run: |
          $tokenPath = Join-Path $env:ProgramData "fivenines_agent\TOKEN"
          if (-not (Test-Path $tokenPath)) {
            Write-Error "TOKEN file missing at $tokenPath"
            exit 1
          }
          $acl = Get-Acl $tokenPath
          $principals = $acl.Access | ForEach-Object { $_.IdentityReference.Value }
          Write-Host "TOKEN ACL principals: $($principals -join ', ')"
          # The Users group must NOT have access.
          if ($principals -match "BUILTIN\\Users" -or $principals -match "Authenticated Users") {
            Write-Error "TOKEN ACL too permissive - includes Users/Authenticated Users"
            exit 1
          }

      - name: Uninstall MSI silently
        shell: pwsh
        run: |
          Start-Process msiexec -ArgumentList "/x fivenines-agent.msi /qn /l*v uninstall.log" -Wait

      - name: Verify uninstall removed service + config dir
        shell: pwsh
        run: |
          $svc = Get-Service -Name "fivenines-agent" -ErrorAction SilentlyContinue
          if ($null -ne $svc) {
            Write-Error "Service still registered after uninstall"
            exit 1
          }
          $configDir = Join-Path $env:ProgramData "fivenines_agent"
          if (Test-Path $configDir) {
            Write-Warning "Config dir survived uninstall: $configDir"
            Get-ChildItem $configDir -Recurse | Out-String
          }

      - name: Cleanup service account
        if: always()
        shell: pwsh
        run: Remove-LocalUser -Name "fivenines-agent" -ErrorAction SilentlyContinue

      - name: Upload install/uninstall logs (on failure or always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-logs
          path: |
            install.log
            uninstall.log
          retention-days: 7
          if-no-files-found: ignore
